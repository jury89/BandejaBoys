name: Padel notifications

on:
  workflow_dispatch:
    inputs:
      test_user_id:
        description: 'UID Firebase destinatario; vuoto per elaborare soltanto la coda ordinaria'
        required: false
        type: string
      test_message:
        description: 'Testo facoltativo della notifica manuale (massimo 240 caratteri)'
        required: false
        type: string
      test_mode:
        description: 'Tipo di collaudo manuale'
        required: false
        default: standard
        type: choice
        options:
          - standard
          - pagelle

concurrency:
  group: padel-notifications
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run notifications:send
        env:
          FIREBASE_PROJECT_ID: bandeja-boys
          FIREBASE_API_KEY: AIzaSyBg2g4X3u0rkPLBRisuWte8Jiie8skcCA4
          FIREBASE_NOTIFIER_EMAIL: ${{ secrets.FIREBASE_NOTIFIER_EMAIL }}
          FIREBASE_NOTIFIER_PASSWORD: ${{ secrets.FIREBASE_NOTIFIER_PASSWORD }}
          WEB_PUSH_VAPID_PUBLIC_KEY: ${{ vars.WEB_PUSH_VAPID_PUBLIC_KEY }}
          WEB_PUSH_VAPID_PRIVATE_KEY: ${{ secrets.WEB_PUSH_VAPID_PRIVATE_KEY }}
          TEST_NOTIFICATION_USER_ID: ${{ inputs.test_user_id }}
          TEST_NOTIFICATION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          TEST_NOTIFICATION_MESSAGE: ${{ inputs.test_message }}
          TEST_NOTIFICATION_MODE: ${{ inputs.test_mode }}
